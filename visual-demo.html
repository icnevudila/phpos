<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Demo - Canvas Örneği</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }
    h1 {
      color: #e94560;
      margin-bottom: 30px;
      font-size: 2.5rem;
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    }
    .gallery {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1200px;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(233, 69, 96, 0.3);
    }
    canvas {
      border-radius: 15px;
      display: block;
    }
    .info {
      color: #fff;
      margin-top: 15px;
      text-align: center;
      font-size: 1rem;
    }
    .emoji-art {
      font-size: 60px;
      text-align: center;
      margin: 20px;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
  </style>
</head>
<body>
  <div class="emoji-art">🎨</div>
  <h1>Visual Demo</h1>
  <div class="gallery">
    <div class="card">
      <canvas id="gradientCanvas" width="250" height="200"></canvas>
      <p class="info">Gradient Art</p>
    </div>
    <div class="card">
      <canvas id="circleCanvas" width="250" height="200"></canvas>
      <p class="info">Daireler & Animasyon</p>
    </div>
    <div class="card">
      <canvas id="waveCanvas" width="250" height="200"></canvas>
      <p class="info">Dalga Efekti</p>
    </div>
    <div class="card">
      <canvas id="particleCanvas" width="250" height="200"></canvas>
      <p class="info">Parçacık Sistemi</p>
    </div>
  </div>

  <script>
    // Gradient Art
    const gradientCanvas = document.getElementById('gradientCanvas');
    const gCtx = gradientCanvas.getContext('2d');
    const gradient = gCtx.createLinearGradient(0, 0, 250, 200);
    gradient.addColorStop(0, '#ff6b6b');
    gradient.addColorStop(0.25, '#feca57');
    gradient.addColorStop(0.5, '#48dbfb');
    gradient.addColorStop(0.75, '#5f27cd');
    gradient.addColorStop(1, '#ff9ff3');
    gCtx.fillStyle = gradient;
    gCtx.fillRect(0, 0, 250, 200);
    gCtx.font = 'bold 40px sans-serif';
    gCtx.fillStyle = 'rgba(255,255,255,0.8)';
    gCtx.textAlign = 'center';
    gCtx.fillText('🎨', 125, 115);

    // Animated Circles
    const circleCanvas = document.getElementById('circleCanvas');
    const cCtx = circleCanvas.getContext('2d');
    let circleAngle = 0;
    function drawCircles() {
      cCtx.fillStyle = '#1a1a2e';
      cCtx.fillRect(0, 0, 250, 200);
      for (let i = 0; i < 8; i++) {
        const angle = circleAngle + (i * Math.PI / 4);
        const x = 125 + Math.cos(angle) * 50;
        const y = 100 + Math.sin(angle) * 50;
        const hue = (i * 45) % 360;
        cCtx.beginPath();
        cCtx.arc(x, y, 25 - i * 2, 0, Math.PI * 2);
        cCtx.fillStyle = `hsl(${hue}, 70%, 60%)`;
        cCtx.fill();
      }
      circleAngle += 0.02;
      requestAnimationFrame(drawCircles);
    }
    drawCircles();

    // Wave Effect
    const waveCanvas = document.getElementById('waveCanvas');
    const wCtx = waveCanvas.getContext('2d');
    let waveOffset = 0;
    function drawWaves() {
      wCtx.fillStyle = '#0f0f23';
      wCtx.fillRect(0, 0, 250, 200);
      for (let j = 0; j < 4; j++) {
        wCtx.beginPath();
        for (let i = 0; i < 250; i++) {
          const y = 60 + j * 35 + Math.sin((i + waveOffset + j * 30) * 0.03) * 15;
          if (i === 0) wCtx.moveTo(i, y);
          else wCtx.lineTo(i, y);
        }
        wCtx.strokeStyle = `rgba(${100 + j * 40}, ${150 + j * 30}, ${255}, 0.8)`;
        wCtx.lineWidth = 3;
        wCtx.stroke();
      }
      waveOffset += 1;
      requestAnimationFrame(drawWaves);
    }
    drawWaves();

    // Particle System
    const particleCanvas = document.getElementById('particleCanvas');
    const pCtx = particleCanvas.getContext('2d');
    const particles = [];
    for (let i = 0; i < 30; i++) {
      particles.push({
        x: Math.random() * 250,
        y: Math.random() * 200,
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        size: Math.random() * 4 + 2,
        color: `hsl(${Math.random() * 360}, 70%, 60%)`
      });
    }
    function drawParticles() {
      pCtx.fillStyle = 'rgba(15, 15, 35, 0.2)';
      pCtx.fillRect(0, 0, 250, 200);
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > 250) p.vx *= -1;
        if (p.y < 0 || p.y > 200) p.vy *= -1;
        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        pCtx.fillStyle = p.color;
        pCtx.fill();
      });
      // Draw connections
      particles.forEach((p1, i) => {
        particles.slice(i + 1).forEach(p2 => {
          const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
          if (dist < 80) {
            pCtx.beginPath();
            pCtx.moveTo(p1.x, p1.y);
            pCtx.lineTo(p2.x, p2.y);
            pCtx.strokeStyle = `rgba(255,255,255,${0.3 * (1 - dist / 80)})`;
            pCtx.stroke();
          }
        });
      });
      requestAnimationFrame(drawParticles);
    }
    drawParticles();
  </script>
</body>
</html>
